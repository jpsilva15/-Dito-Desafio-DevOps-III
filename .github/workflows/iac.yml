name: Terraform IaC

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'IaC/**'
  push:
    branches: [ main ]
    paths:
      - 'IaC/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente alvo do apply manual'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  TF_VERSION: '1.13.3'

defaults:
  run:
    working-directory: IaC

jobs:
  validate-staging:
    name: Validação → staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config=backend-staging.hcl

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

  validate-production:
    name: Validação → production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config=backend-production.hcl

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

  plan-staging:
    name: Plan → staging
    runs-on: ubuntu-latest
    needs: validate-staging
    if: github.event_name != 'workflow_dispatch' || inputs.environment == 'staging'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config=backend-staging.hcl

      - name: Terraform Plan
        run: terraform plan -var-file=staging.tfvars -no-color -out=tfplan-staging 2>&1 | tee plan-staging.txt
        continue-on-error: true

      - name: Upload tfplan-staging
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-staging
          path: IaC/tfplan-staging
          retention-days: 1

  plan-production:
    name: Plan → production
    runs-on: ubuntu-latest
    needs: validate-production
    if: github.event_name != 'workflow_dispatch' || inputs.environment == 'production'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config=backend-production.hcl

      - name: Terraform Plan
        run: terraform plan -var-file=production.tfvars -no-color -out=tfplan-production 2>&1 | tee plan-production.txt
        continue-on-error: true

      - name: Upload tfplan-production
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-production
          path: IaC/tfplan-production
          retention-days: 1

