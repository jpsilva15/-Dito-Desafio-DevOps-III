name: Deploy to EKS

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag da imagem ECR a implantar (deixe vazio para usar o SHA do commit)'
        required: false
        default: ''

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECR_REPOSITORY: dito-demo
  EKS_CLUSTER: ${{ secrets.EKS_CLUSTER_NAME }}
  IMAGE_TAG: ${{ inputs.image_tag || github.sha }}

jobs:
  dockerfile-lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: warning

  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod

      - name: Test
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

  vuln-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  gosec:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: gosec
        uses: securego/gosec@master
        with:
          args: -fmt json -out gosec-report.json ./app/...

  staticcheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  dependency-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod

      - name: dependency-audit
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum


  secret-scan:
    name: Gitleaks — secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs:
    - dependency-audit
    - staticcheck
    - gosec
    - vuln-check
    - test
    - dockerfile-lint
    - secret-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build e Push da imagem Docker
        run: |
          docker build -f app/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG app/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  trivy-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: build
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivy — scan da imagem
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

  manifest-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    needs: trivy-scan
    environment: dev
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Atualizar e commitar overlay (dev)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          cd manifests/overlays/dev
          kustomize edit set image go-app=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          cd -
          git add manifests/overlays/dev/kustomization.yaml
          git diff --cached --quiet || git commit -m "chore(dev): atualiza imagem para $IMAGE_TAG [skip ci]"
          git push

  manifest-prod:
    name: Deploy → prod
    runs-on: ubuntu-latest
    needs: manifest-dev
    environment: prod
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Atualizar e commitar overlay (prod)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          cd manifests/overlays/prod
          kustomize edit set image go-app=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          cd -
          git add manifests/overlays/prod/kustomization.yaml
          git diff --cached --quiet || git commit -m "chore(prod): atualiza imagem para $IMAGE_TAG [skip ci]"
          git push
